name: Update Package Bundle

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'
  push:
    branches: [main]
    paths:
      - '.github/workflows/update-bundle.yml'

jobs:
  build-and-sign:
    if: github.repository == 'kallhoffa/SecureAgentBase'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import GPG key
        env:
          GPG_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_KEY" | base64 -d > private.gpg
          gpg --import --no-tty private.gpg

      - name: Set up GCS auth
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          echo "$GCP_SA_KEY" | base64 -d > /tmp/gcs-sa.json
          gcloud auth activate-service-account --key-file=/tmp/gcs-sa.json

      - name: Build bundle
        run: |
          mkdir -p kimaki gh nodejs bun opencode
          # Install opencode binary via official installer (creates in ~/.opencode)
          curl -fsSL https://opencode.ai/install | bash
          # Copy opencode to bundle directory
          cp -r ~/.opencode opencode/
          
          # Install kimaki via npm and copy with node_modules
          docker run --rm \
            -v $(pwd):/output \
            node:20-bullseye bash -c "
              NPM_GLOBAL=\$(npm root -g)
              npm install -g kimaki@latest
              cp -r \$NPM_GLOBAL/kimaki /output/kimaki/
              echo 'Kimaki node_modules:'
              ls /output/kimaki/kimaki/node_modules/ | head -10
            "

      - name: Download gh CLI
        run: |
          curl -fsSL https://github.com/cli/cli/releases/download/v2.63.2/gh_2.63.2_linux_amd64.tar.gz | tar -xz -C gh --strip-components=2

      - name: Download Node.js 20
        run: |
          curl -fsSL https://nodejs.org/dist/v20.18.0/node-v20.18.0-linux-x64.tar.gz | tar -xz -C nodejs --strip-components=1

      - name: Download Bun
        run: |
          curl -fsSL https://github.com/oven-sh/bun/releases/download/bun-v1.1.42/bun-linux-x64.zip -o bun.zip
          unzip -o bun.zip
          mv bun-linux-x64/* bun/
          rm -rf bun-linux-x64 bun.zip

      - name: Create bundle
        run: tar -czvf debian-packages.tar.gz kimaki/ gh/ nodejs/ bun/ opencode/

      - name: Sign bundle
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          gpg --batch --yes --pinentry-mode loopback \
              --passphrase "$GPG_PASSPHRASE" \
              --armor --detach-sign \
              --local-user bundles@secureagent.app \
              debian-packages.tar.gz

      - name: Upload to GCS
        env:
          GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
        run: |
          gsutil cp debian-packages.tar.gz gs://${GCS_BUCKET}/
          gsutil cp debian-packages.tar.gz.asc gs://${GCS_BUCKET}/

      - name: Verify public bucket access
        env:
          GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
        run: |
          curl -sI "https://storage.googleapis.com/${GCS_BUCKET}/debian-packages.tar.gz" | head -1
          curl -sI "https://storage.googleapis.com/${GCS_BUCKET}/debian-packages.tar.gz.asc" | head -1
